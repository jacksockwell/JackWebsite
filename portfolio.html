<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio | Jack Sockwell</title>
  <meta name="description" content="Portfolio work by Jack Sockwell." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-portfolio">
  <main class="site-shell" id="siteShell">
    <div class="bg-block bg-block-pink" data-depth="16"></div>
    <div class="bg-block bg-block-green" data-depth="11"></div>
    <div class="bg-block bg-block-yellow" data-depth="13"></div>
    <div class="bg-line bg-line-top" data-depth="18"></div>
    <div class="bg-line bg-line-right" data-depth="20"></div>

    <section class="portfolio-page">
      <div class="portfolio-topbar">
        <div class="portfolio-heading">
          <p>Jack Sockwell</p>
          <h1>Portfolio</h1>
        </div>

        <a class="back-link" href="index.html">Back Home</a>
      </div>

      <div class="portfolio-grid">
        <figure class="portfolio-piece portfolio-piece-large parallax-panel" data-depth="10">
          <img src="1.png" alt="Portfolio image 1" />
          <figcaption class="piece-label">01</figcaption>
        </figure>

        <figure class="portfolio-piece portfolio-piece-tall parallax-panel" data-depth="14">
          <img src="2.png" alt="Portfolio image 2" />
          <figcaption class="piece-label">02</figcaption>
        </figure>

        <figure class="portfolio-piece parallax-panel" data-depth="12">
          <img src="3.png" alt="Portfolio image 3" />
          <figcaption class="piece-label">03</figcaption>
        </figure>

        <figure class="portfolio-piece parallax-panel" data-depth="16">
          <img src="4.png" alt="Portfolio image 4" />
          <figcaption class="piece-label">04</figcaption>
        </figure>

        <figure class="portfolio-piece portfolio-piece-wide parallax-panel" data-depth="11">
          <img src="5.png" alt="Portfolio image 5" />
          <figcaption class="piece-label">05</figcaption>
        </figure>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
