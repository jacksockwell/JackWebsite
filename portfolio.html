<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio | Jack Sockwell</title>
  <meta name="description" content="Portfolio work by Jack Sockwell." />
  <link rel="stylesheet" href="styles.css?v=20260407ah" />
</head>
<body class="page-portfolio">
  <main class="site-shell" id="siteShell">
    <section class="portfolio-page">
      <div class="portfolio-topbar">
        <div class="portfolio-heading">
          <p>Pick where you want to go</p>
          <h1>Portfolio</h1>
        </div>

        <a class="back-link" href="index.html">Back Home</a>
      </div>

      <section class="portfolio-rail">
        <section class="portfolio-launcher" id="portfolioLauncher" aria-label="Choose portfolio section">
          <div class="portfolio-launcher-copy">
            <div class="portfolio-launcher-message">
              <p class="portfolio-launcher-rotator" id="portfolioLauncherRotator">
                Thank you for checking my stuff out! Pick an option below
              </p>
            </div>
          </div>

          <nav class="portfolio-tabs" aria-label="Portfolio sections">
            <button class="portfolio-tab portfolio-tab-art" data-portfolio-view="artwork" type="button">Art</button>
            <button class="portfolio-tab portfolio-tab-resume" data-portfolio-view="resume" type="button">Resume</button>
            <a class="portfolio-tab portfolio-tab-shop" href="shop.html">Shop</a>
          </nav>
        </section>

        <section class="portfolio-content" id="portfolioContent" hidden>
          <section class="portfolio-section portfolio-panel" data-portfolio-panel="artwork" aria-labelledby="portfolio-artwork-heading">
            <div class="portfolio-summary">
              <h2 id="portfolio-artwork-heading">Artwork</h2>
            </div>

            <div class="portfolio-post-grid" id="portfolioPostGrid" aria-label="Portfolio posts"></div>
          </section>

          <section class="portfolio-section portfolio-panel" data-portfolio-panel="resume" aria-labelledby="portfolio-resume-heading" hidden>
            <div class="portfolio-summary">
              <h2 id="portfolio-resume-heading">Resume</h2>
            </div>

            <div class="portfolio-credit-grid" id="portfolioCreditGrid" aria-label="Games and video contributions"></div>
          </section>
        </section>
      </section>
    </section>
  </main>

  <div class="portfolio-lightbox" id="portfolioLightbox" hidden>
    <button class="portfolio-lightbox-close" id="portfolioLightboxClose" type="button" aria-label="Close viewer">Close</button>
    <button class="portfolio-lightbox-nav portfolio-lightbox-prev" id="portfolioLightboxPrev" type="button" aria-label="Previous image">Prev</button>
    <figure class="portfolio-lightbox-frame">
      <img id="portfolioLightboxImage" src="" alt="Portfolio enlarged image" />
      <figcaption class="portfolio-lightbox-caption">
        <p class="portfolio-lightbox-counter" id="portfolioLightboxCounter">1 / 1</p>
        <h2 class="portfolio-lightbox-title" id="portfolioLightboxTitle">Selected Work</h2>
        <p class="portfolio-lightbox-meta" id="portfolioLightboxMeta"></p>
        <p class="portfolio-lightbox-details" id="portfolioLightboxCaption"></p>
      </figcaption>
    </figure>
    <button class="portfolio-lightbox-nav portfolio-lightbox-next" id="portfolioLightboxNext" type="button" aria-label="Next image">Next</button>
  </div>

  <script src="portfolio-data.js?v=20260407-portfolio-tabs3"></script>
  <script src="script.js?v=20260407aa"></script>
</body>
</html>
