<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio | Jack Sockwell</title>
  <meta name="description" content="Portfolio work by Jack Sockwell." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-portfolio">
  <main class="site-shell" id="siteShell">
    <div class="bg-block bg-block-pink" data-depth="16"></div>
    <div class="bg-block bg-block-green" data-depth="11"></div>
    <div class="bg-block bg-block-yellow" data-depth="13"></div>
    <div class="bg-line bg-line-top" data-depth="18"></div>
    <div class="bg-line bg-line-right" data-depth="20"></div>

    <section class="portfolio-page">
      <div class="portfolio-topbar">
        <div class="portfolio-heading">
          <p>Jack Sockwell</p>
          <h1>Portfolio</h1>
        </div>

        <a class="back-link" href="index.html">Back Home</a>
      </div>

      <section class="portfolio-showcase" aria-label="Portfolio gallery">
        <div class="portfolio-stage">
          <figure class="portfolio-hero">
            <img
              id="portfolioHeroImage"
              class="portfolio-hero-image"
              src="1.png"
              alt="Portfolio featured image 1" />
          </figure>

          <div class="portfolio-controls">
            <button class="portfolio-arrow" id="portfolioPrev" type="button" aria-label="Previous image">Prev</button>
            <button class="portfolio-arrow" id="portfolioNext" type="button" aria-label="Next image">Next</button>
          </div>
        </div>

        <div class="portfolio-thumbs" aria-label="Choose portfolio image">
          <button class="portfolio-thumb is-active" type="button" data-image="1.png" data-alt="Portfolio featured image 1" aria-pressed="true">
            <img src="1.png" alt="Portfolio thumbnail 1" />
          </button>
          <button class="portfolio-thumb" type="button" data-image="2.png" data-alt="Portfolio featured image 2" aria-pressed="false">
            <img src="2.png" alt="Portfolio thumbnail 2" />
          </button>
          <button class="portfolio-thumb" type="button" data-image="3.png" data-alt="Portfolio featured image 3" aria-pressed="false">
            <img src="3.png" alt="Portfolio thumbnail 3" />
          </button>
          <button class="portfolio-thumb" type="button" data-image="4.png" data-alt="Portfolio featured image 4" aria-pressed="false">
            <img src="4.png" alt="Portfolio thumbnail 4" />
          </button>
          <button class="portfolio-thumb" type="button" data-image="5.png" data-alt="Portfolio featured image 5" aria-pressed="false">
            <img src="5.png" alt="Portfolio thumbnail 5" />
          </button>
        </div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
