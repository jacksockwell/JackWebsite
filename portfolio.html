<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio | Jack Sockwell</title>
  <meta name="description" content="Portfolio work by Jack Sockwell." />
  <link rel="stylesheet" href="styles.css?v=20260406-portfolio-gallery" />
</head>
<body class="page-portfolio">
  <main class="site-shell" id="siteShell">
    <section class="portfolio-page">
      <div class="portfolio-topbar">
        <div class="portfolio-heading">
          <h1>Portfolio</h1>
        </div>

        <a class="back-link" href="index.html">Back Home</a>
      </div>

      <section class="portfolio-rail">
        <div class="portfolio-post-grid" aria-label="Portfolio posts">
          <button class="portfolio-post" type="button" data-portfolio-index="0">
            <span class="portfolio-post-image">
              <img src="1.png" alt="Portfolio post 1 cover" />
            </span>
            <span class="portfolio-post-copy">
              <span class="portfolio-post-title">Horror Scene Study</span>
            </span>
          </button>

          <button class="portfolio-post" type="button" data-portfolio-index="1">
            <span class="portfolio-post-image">
              <img src="2.png" alt="Portfolio post 2 cover" />
            </span>
            <span class="portfolio-post-copy">
              <span class="portfolio-post-title">Branding Render</span>
            </span>
          </button>

          <button class="portfolio-post" type="button" data-portfolio-index="2">
            <span class="portfolio-post-image">
              <img src="3.png" alt="Portfolio post 3 cover" />
            </span>
            <span class="portfolio-post-copy">
              <span class="portfolio-post-title">Creature Portrait</span>
            </span>
          </button>

          <button class="portfolio-post" type="button" data-portfolio-index="3">
            <span class="portfolio-post-image">
              <img src="4.png" alt="Portfolio post 4 cover" />
            </span>
            <span class="portfolio-post-copy">
              <span class="portfolio-post-title">Graphic Illustration</span>
            </span>
          </button>

          <button class="portfolio-post" type="button" data-portfolio-index="4">
            <span class="portfolio-post-image">
              <img src="5.png" alt="Portfolio post 5 cover" />
            </span>
            <span class="portfolio-post-copy">
              <span class="portfolio-post-title">Worldbuilding Frame</span>
            </span>
          </button>
        </div>
      </section>
    </section>
  </main>

  <div class="portfolio-lightbox" id="portfolioLightbox" hidden>
    <button class="portfolio-lightbox-close" id="portfolioLightboxClose" type="button" aria-label="Close viewer">Close</button>
    <button class="portfolio-lightbox-nav portfolio-lightbox-prev" id="portfolioLightboxPrev" type="button" aria-label="Previous image">Prev</button>
    <figure class="portfolio-lightbox-frame">
      <img id="portfolioLightboxImage" src="1.png" alt="Portfolio enlarged image" />
      <figcaption id="portfolioLightboxCaption">Selected Work</figcaption>
    </figure>
    <button class="portfolio-lightbox-nav portfolio-lightbox-next" id="portfolioLightboxNext" type="button" aria-label="Next image">Next</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
