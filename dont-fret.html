<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Don't Fret | Jack Sockwell</title>
  <meta name="description" content="Don't Fret by Jack Sockwell." />
  <link rel="stylesheet" href="styles.css?v=20260406-fret-clean" />
  <style>
    body.page-fret {
      margin: 0;
      background: #c40018;
    }

    .page-fret .site-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #c40018;
    }

    .page-fret .site-shell::before,
    .page-fret .site-shell::after {
      content: none;
    }

    .fret-steam-only {
      width: min(720px, 100%);
      display: grid;
      gap: 16px;
    }

    .page-fret .steam-shell {
      min-height: auto;
      padding: 18px;
      background: #8e0012;
      border: 4px solid #1a0004;
      box-shadow: 14px 14px 0 rgba(26, 0, 4, 0.3);
    }

    .fret-home-link {
      justify-self: start;
      display: inline-grid;
      place-items: center;
      min-height: 52px;
      padding: 12px 16px;
      border: 3px solid #1a0004;
      background: #6a0010;
      color: #ffcf66;
      text-decoration: none;
      text-transform: uppercase;
      font-size: 0.82rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      box-shadow: 8px 8px 0 rgba(26, 0, 4, 0.22);
    }
  </style>
</head>
<body class="page-fret">
  <main class="site-shell" id="siteShell">
    <section class="fret-steam-only">
      <a class="fret-home-link" href="index.html">Back Home</a>
      <div class="steam-shell steam-shell-solo">
        <iframe
          class="steam-widget"
          src="https://store.steampowered.com/widget/2716830/"
          frameborder="0"
          width="100%"
          height="190"
          loading="lazy"
          title="Don't Fret on Steam">
        </iframe>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
