<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Don't Fret | Jack Sockwell</title>
  <meta name="description" content="Don't Fret by Jack Sockwell." />
  <link rel="stylesheet" href="styles.css?v=20260406-fret-clean" />
  <style>
    body.page-fret {
      margin: 0;
      background: #060001;
    }

    .page-fret .site-shell {
      position: relative;
      isolation: isolate;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      overflow: hidden;
      background: #060001;
    }

    .page-fret .site-shell::before,
    .page-fret .site-shell::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }

    .page-fret .site-shell::before {
      inset: -14%;
      z-index: 0;
      background:
        repeating-conic-gradient(from 45deg, #050505 0 25%, #940014 0 50%) 50% / 10px 10px;
      transform-origin: center;
      animation: fret-checker-warp 30s ease-in-out infinite alternate;
    }

    .page-fret .site-shell::after {
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 18, 62, 0.1), transparent 55%),
        linear-gradient(180deg, rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0.5));
    }

    @keyframes fret-checker-warp {
      0% {
        transform: translate3d(-2%, -1%, 0) scale(1) skew(0deg, 0deg) rotate(0deg);
        background-position: 0 0;
      }

      25% {
        transform: translate3d(1%, -2%, 0) scale(1.05) skew(1.4deg, -1deg) rotate(-0.4deg);
        background-position: 10px -6px;
      }

      50% {
        transform: translate3d(-1%, 2%, 0) scale(1.09) skew(-1.2deg, 1.5deg) rotate(0.6deg);
        background-position: -8px 12px;
      }

      75% {
        transform: translate3d(2%, 1%, 0) scale(1.06) skew(1deg, 1.2deg) rotate(-0.6deg);
        background-position: 12px 4px;
      }

      100% {
        transform: translate3d(-2%, -2%, 0) scale(1.11) skew(-1.5deg, -1deg) rotate(0.5deg);
        background-position: -10px -10px;
      }
    }

    .fret-steam-only {
      position: relative;
      z-index: 1;
      width: min(720px, 100%);
      display: grid;
      gap: 16px;
    }

    .page-fret .steam-shell {
      min-height: auto;
      padding: 18px;
      background: #8e0012;
      border: 4px solid #1a0004;
      box-shadow: 14px 14px 0 rgba(26, 0, 4, 0.3);
    }

    .fret-home-link {
      justify-self: start;
      display: inline-grid;
      place-items: center;
      min-height: 52px;
      padding: 12px 16px;
      border: 3px solid #1a0004;
      background: #6a0010;
      color: #ffcf66;
      text-decoration: none;
      text-transform: uppercase;
      font-size: 0.82rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      box-shadow: 8px 8px 0 rgba(26, 0, 4, 0.22);
    }
  </style>
</head>
<body class="page-fret">
  <main class="site-shell" id="siteShell">
    <section class="fret-steam-only">
      <a class="fret-home-link" href="index.html">Back Home</a>
      <div class="steam-shell steam-shell-solo">
        <iframe
          class="steam-widget"
          src="https://store.steampowered.com/widget/2716830/"
          frameborder="0"
          width="100%"
          height="190"
          loading="lazy"
          title="Don't Fret on Steam">
        </iframe>
      </div>
    </section>
  </main>

  <script src="script.js?v=20260407w"></script>
</body>
</html>
