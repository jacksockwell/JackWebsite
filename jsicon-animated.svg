<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" aria-hidden="true">
  <defs>
    <linearGradient id="jFill" x1="30" y1="60" x2="260" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f475ff"/>
      <stop offset="1" stop-color="#d058f0"/>
    </linearGradient>
    <linearGradient id="sFill" x1="220" y1="120" x2="450" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9a80ff"/>
      <stop offset="1" stop-color="#7064ff"/>
    </linearGradient>
    <style>
      .bg-panel {
        fill: #177fdc;
        animation: bgFloat 7.4s ease-in-out infinite alternate;
      }

      .dark-panel {
        fill: #041127;
        animation: plateFloat 9.2s ease-in-out infinite alternate;
        transform-origin: 250px 250px;
      }

      .j-shadow {
        fill: #7b1d79;
        animation: jFloat 6.6s ease-in-out infinite alternate;
      }

      .j-main {
        fill: url(#jFill);
        animation: jFloat 6.6s ease-in-out infinite alternate;
      }

      .s-shadow {
        fill: #2868c8;
        animation: sFloat 6.9s ease-in-out infinite alternate;
      }

      .s-main {
        fill: url(#sFill);
        animation: sFloat 6.9s ease-in-out infinite alternate;
      }

      @keyframes bgFloat {
        0% {
          transform: translate(0px, 0px);
        }

        100% {
          transform: translate(-6px, 7px);
        }
      }

      @keyframes plateFloat {
        0% {
          transform: translate(0px, 0px) rotate(0deg);
        }

        100% {
          transform: translate(7px, -6px) rotate(-1.2deg);
        }
      }

      @keyframes jFloat {
        0% {
          transform: translate(0px, 0px);
        }

        100% {
          transform: translate(-4px, 3px);
        }
      }

      @keyframes sFloat {
        0% {
          transform: translate(0px, 0px);
        }

        100% {
          transform: translate(4px, -3px);
        }
      }
    </style>
  </defs>

  <rect class="bg-panel" x="-18" y="-18" width="536" height="536"/>
  <polygon class="dark-panel" points="4,79 437,40 490,455 62,486"/>

  <path
    class="j-shadow"
    d="M53 62H458V130H244V451H40V397H166V130H53Z"
    transform="translate(10 9)"
  />
  <path
    class="j-main"
    d="M43 62H448V130H234V451H30V397H156V130H43Z"
  />

  <path
    class="s-shadow"
    d="M211 132H444V184H289V266H410V451H211V396H365V319H244V184H211Z"
    transform="translate(11 9)"
  />
  <path
    class="s-main"
    d="M211 132H444V184H289V266H410V451H211V396H365V319H244V184H211Z"
  />
</svg>
