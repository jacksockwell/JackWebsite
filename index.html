<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jack Sockwell</title>
  <meta name="description" content="Jack Sockwell portfolio and projects." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-home">
  <main class="site-shell" id="siteShell">
    <div class="bg-block bg-block-pink" data-depth="16"></div>
    <div class="bg-block bg-block-green" data-depth="11"></div>
    <div class="bg-block bg-block-yellow" data-depth="13"></div>
    <div class="bg-line bg-line-top" data-depth="18"></div>
    <div class="bg-line bg-line-right" data-depth="20"></div>

    <section class="hero-home">
      <div class="hero-stack">
        <div class="mini-tag">Jack Sockwell</div>
        <h1 class="hero-name">JACK<br />SOCKWELL</h1>

        <nav class="hero-actions" aria-label="Primary">
          <a class="action-block block-portfolio" href="portfolio.html">Portfolio</a>
          <button class="action-block block-fret" type="button" data-section-target="dont-fret">Don't Fret</button>
          <button class="action-block block-about" type="button" data-section-target="about">About Me</button>
        </nav>
      </div>
    </section>

    <section class="overlay-layer" aria-live="polite">
      <article class="overlay-panel panel-fret" id="dont-fret" data-section>
        <div class="panel-toolbar">
          <p class="panel-label">Featured Game</p>
          <button class="panel-close" type="button" data-close-section aria-label="Close section">Close</button>
        </div>

        <div class="fret-layout">
          <div class="fret-copy">
            <div class="square-banner" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
            <h2>DON'T FRET</h2>
            <p>Music horror. Puzzle pressure. Loud, tense, strange.</p>
          </div>

          <div class="steam-shell">
            <iframe
              class="steam-widget"
              src="https://store.steampowered.com/widget/2716830/"
              frameborder="0"
              width="100%"
              height="190"
              loading="lazy"
              title="Don't Fret on Steam">
            </iframe>
          </div>
        </div>
      </article>

      <article class="overlay-panel panel-about" id="about" data-section>
        <div class="panel-toolbar">
          <p class="panel-label">About</p>
          <button class="panel-close" type="button" data-close-section aria-label="Close section">Close</button>
        </div>

        <div class="about-layout">
          <div class="about-title-block">
            <h2>JACK<br />SOCKWELL</h2>
            <p>Worldbuilding, visuals, and strange little spaces.</p>
          </div>

          <div class="about-grid">
            <div class="about-card pink-card">Artist</div>
            <div class="about-card green-card">Builder</div>
            <div class="about-card yellow-card">Designer</div>
            <div class="about-card ink-card">Minimal words. Heavy shapes.</div>
          </div>
        </div>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
