<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jack Sockwell</title>
  <meta name="description" content="Jack Sockwell portfolio and projects." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="site-shell" id="siteShell">
    <div class="shape shape-coral" data-depth="15"></div>
    <div class="shape shape-sky" data-depth="11"></div>
    <div class="shape shape-cream" data-depth="18"></div>
    <div class="shape shape-gold" data-depth="13"></div>

    <section class="landing" aria-label="Homepage">
      <div class="landing-inner">
        <p class="name-tag">Jack Sockwell</p>
        <nav class="home-nav" aria-label="Primary">
          <button class="home-option" type="button" data-section-target="portfolio">Portfolio</button>
          <button class="home-option" type="button" data-section-target="dont-fret">Don't Fret</button>
          <button class="home-option" type="button" data-section-target="about">About Me</button>
        </nav>
      </div>
    </section>

    <section class="sections" aria-live="polite">
      <article class="content-panel" id="portfolio" data-section>
        <div class="panel-head">
          <p class="panel-kicker">Portfolio</p>
          <button class="panel-close" type="button" data-close-section aria-label="Close section">Close</button>
        </div>

        <div class="portfolio-grid">
          <figure class="art-card art-card-large parallax-panel" data-depth="10">
            <img src="1.png" alt="Portfolio image 1" />
          </figure>
          <figure class="art-card art-card-tall parallax-panel" data-depth="14">
            <img src="2.png" alt="Portfolio image 2" />
          </figure>
          <figure class="art-card parallax-panel" data-depth="12">
            <img src="3.png" alt="Portfolio image 3" />
          </figure>
          <figure class="art-card parallax-panel" data-depth="16">
            <img src="4.png" alt="Portfolio image 4" />
          </figure>
          <figure class="art-card art-card-wide parallax-panel" data-depth="11">
            <img src="5.png" alt="Portfolio image 5" />
          </figure>
        </div>
      </article>

      <article class="content-panel dont-fret-panel" id="dont-fret" data-section>
        <div class="panel-head">
          <p class="panel-kicker">Don't Fret</p>
          <button class="panel-close panel-close-dark" type="button" data-close-section aria-label="Close section">Close</button>
        </div>

        <div class="dont-fret-grid">
          <div class="dont-fret-copy">
            <div class="square-stack" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
            <h2>Don't Fret</h2>
            <a class="fret-link" href="https://store.steampowered.com/app/2716830/Dont_Fret/" target="_blank" rel="noopener noreferrer">Steam</a>
          </div>

          <figure class="dont-fret-visual parallax-panel" data-depth="9">
            <img src="header.jpg" alt="Don't Fret header art" />
          </figure>
        </div>
      </article>

      <article class="content-panel about-panel" id="about" data-section>
        <div class="panel-head">
          <p class="panel-kicker">About Me</p>
          <button class="panel-close" type="button" data-close-section aria-label="Close section">Close</button>
        </div>

        <div class="about-layout">
          <div class="about-copy">
            <h2>Jack Sockwell</h2>
            <p>Visuals, worlds, and sharp little experiments.</p>
          </div>

          <div class="about-blocks">
            <div class="about-tile soft-coral">Artist</div>
            <div class="about-tile soft-sky">Builder</div>
            <div class="about-tile soft-gold">Designer</div>
          </div>
        </div>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
