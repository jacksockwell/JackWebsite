<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About | Jack Sockwell</title>
  <meta name="description" content="About Jack Sockwell." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-about">
  <main class="site-shell" id="siteShell">
    <div class="bg-block bg-block-pink" data-depth="16"></div>
    <div class="bg-block bg-block-green" data-depth="11"></div>
    <div class="bg-block bg-block-yellow" data-depth="13"></div>
    <div class="bg-line bg-line-top" data-depth="18"></div>
    <div class="bg-line bg-line-right" data-depth="20"></div>

    <section class="standalone-page">
      <div class="page-topbar about-topbar">
        <div class="portfolio-heading about-heading">
          <p>Jack Sockwell</p>
          <h1>About Me</h1>
        </div>

        <a class="back-link" href="index.html">Back Home</a>
      </div>

      <section class="about-remix">
        <div class="about-floating about-floating-pink" data-depth="18"></div>
        <div class="about-floating about-floating-green" data-depth="14"></div>
        <div class="about-floating about-floating-yellow" data-depth="16"></div>

        <div class="about-main-card">
          <div class="about-icon-panel">
            <div class="icon-frame">
              <img src="JSICON_500x500.png" alt="Jack Sockwell icon" class="about-icon-large" />
            </div>
          </div>

          <div class="about-info-panel">
            <div class="bio-chip chip-pink">Jack Sockwell</div>
            <h2>Visual Builder<br />And Designer</h2>

            <div class="bio-facts" aria-label="About Jack Sockwell">
              <div class="bio-chip chip-yellow">Saint Clair, PA</div>
              <div class="bio-chip chip-green">20 years old</div>
              <div class="bio-chip chip-ink">he/him</div>
            </div>

            <p class="about-blurb">
              Worldbuilding, visuals, and sharp little ideas with a blocky, playful edge.
            </p>

            <div class="about-roles">
              <div class="role-block role-pink">Artist</div>
              <div class="role-block role-green">Builder</div>
              <div class="role-block role-yellow">Designer</div>
            </div>

            <div class="statement-block">
              Minimal words. Heavy shapes.
            </div>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
